<!DOCTYPE strict html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switchboard IAM | MVP Setup</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { margin-top: 0; color: #2c3e50; }
        .status { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; font-weight: bold; margin-top: 1rem; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Switchboard</h1>
        <p>Identity & Access Management Dashboard</p>
        <p><strong>System Status:</strong></p>
        <div id="db-status" class="status">Checking connection...</div>
    </div>

    <script>
        fetch('/health')
            .then(async res => {
                // If the server returns an HTML error page instead of JSON, catch it
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`HTTP ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                const el = document.getElementById('db-status');
                if(data.database === 'connected') {
                    el.textContent = 'Database Connected (Port 7923)';
                    el.className = 'status success';
                } else {
                    el.textContent = 'Database Disconnected';
                    el.className = 'status error';
                }
            })
            .catch(err => {
                const el = document.getElementById('db-status');
                // Print the exact error so we know what is happening
                el.textContent = 'API Offline: ' + err.message;
                el.className = 'status error';
            });
    </script>
</body>
</html>
